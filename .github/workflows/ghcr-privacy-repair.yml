name: GHCR Privacy Repair

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repair:
    runs-on: ubuntu-24.04
    env:
      BUILDX_METADATA_PROVENANCE: "disabled"
      DOCKER_BUILD_RECORD_UPLOAD: "false"
      DOCKER_BUILD_SUMMARY: "false"
      PACKAGE_NAME: cpa-codex-agent-identity
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: v0.3.1
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Rebuild v0.3.1 without provenance
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:v0.3.1
            ghcr.io/${{ github.repository }}:latest
          provenance: false
          sbom: true
      - name: Delete leaked package versions
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          endpoint=/users/${GITHUB_REPOSITORY_OWNER}/packages/container/${PACKAGE_NAME}/versions
          leaked_digests=(
            "sha256:7e406551efeed808c99ec2f3018abcd862e928a4e2fb3e560dfba4e2ba393f59"
            "sha256:00e659d9fda43b3fe7bfde6956bf13528def4a5115e439070944c2d5293125cb"
          )

          versions="$(gh api --paginate "${endpoint}")"
          for digest in "${leaked_digests[@]}"; do
            mapfile -t version_ids < <(jq -r --arg digest "${digest}" '.[] | select(.name == $digest) | .id' <<<"${versions}")
            for version_id in "${version_ids[@]}"; do
              gh api --method DELETE "${endpoint}/${version_id}"
            done
          done

          remaining="$(gh api --paginate "${endpoint}")"
          for digest in "${leaked_digests[@]}"; do
            jq -e --arg digest "${digest}" 'all(.name != $digest)' <<<"${remaining}"
          done
