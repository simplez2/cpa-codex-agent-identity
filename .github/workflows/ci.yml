name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Check Go formatting
        shell: bash
        run: |
          set -euo pipefail
          find . -type f -name '*.go' -not -path './.git/*' -print0 | xargs -0 gofmt -l | tee /tmp/gofmt.out
          test ! -s /tmp/gofmt.out
      - name: Validate plugin registry
        run: jq -e -f .github/scripts/validate-registry.jq registry.json
      - name: Enforce private release metadata
        shell: bash
        run: |
          set -euo pipefail
          workflow=.github/workflows/release.yml
          test "$(grep -Ec '^[[:space:]]+provenance:[[:space:]]+false[[:space:]]*$' "${workflow}")" -eq 1
          grep -Eq '^[[:space:]]+BUILDX_METADATA_PROVENANCE:[[:space:]]+"disabled"[[:space:]]*$' "${workflow}"
          grep -Eq '^[[:space:]]+DOCKER_BUILD_RECORD_UPLOAD:[[:space:]]+"false"[[:space:]]*$' "${workflow}"
          grep -Eq '^[[:space:]]+DOCKER_BUILD_SUMMARY:[[:space:]]+"false"[[:space:]]*$' "${workflow}"

  secrets:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install verified Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          archive="/tmp/gitleaks_8.30.1_linux_x64.tar.gz"
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
            --output "${archive}" \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  ${archive}" | sha256sum --check --strict
          tar -xzf "${archive}" -C /tmp gitleaks
          /tmp/gitleaks version
      - name: Scan current tree and Git history
        shell: bash
        run: |
          set -euo pipefail
          /tmp/gitleaks dir . --redact --no-banner --no-color
          /tmp/gitleaks git . --log-opts='--all' --redact --no-banner --no-color
      - name: Enforce private Git identities
        shell: bash
        run: |
          set -euo pipefail
          noreply='^(noreply@github\.com|[^[:space:]@]+@users\.noreply\.github\.com)$'
          head_sha="${GITHUB_SHA}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            head_sha="$(jq -er '.pull_request.head.sha' "${GITHUB_EVENT_PATH}")"
          fi
          if git log "${head_sha}" --format='%ae%n%ce' | grep -Evq "${noreply}"; then
            echo '::error::Git history contains a non-noreply author or committer email.'
            exit 1
          fi
          if git for-each-ref --format='%(taggeremail:trim)' refs/tags | grep -Evq "^(|noreply@github\.com|[^[:space:]@]+@users\.noreply\.github\.com)$"; then
            echo '::error::A tag contains a non-noreply tagger email.'
            exit 1
          fi

  sidecar:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            plugin/codex-agent-identity/go.sum
      - run: go test ./... -count=1
      - run: go test -race ./... -count=1
      - run: go vet ./...
      - run: CGO_ENABLED=0 go build -trimpath -buildvcs=false ./cmd/sidecar

  cpa-plugin:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: plugin/codex-agent-identity
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: plugin/codex-agent-identity/go.mod
          cache-dependency-path: plugin/codex-agent-identity/go.sum
      - run: go test ./... -count=1
      - run: go test -race ./... -count=1
      - run: go vet ./...
      - run: CGO_ENABLED=1 go build -trimpath -buildvcs=false -buildmode=c-shared -o /tmp/codex-agent-identity.so .

  container:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Verify image binary architecture
        shell: bash
        run: |
          set -euo pipefail
          while IFS='|' read -r platform arch expected_machine; do
            tag="cpa-codex-agent-identity-ci:${arch}"
            container="cpa-codex-agent-identity-ci-${arch}"
            binary="/tmp/codex-agent-identity-sidecar-${arch}"
            docker buildx build --platform "${platform}" --load --tag "${tag}" .
            docker create --platform "${platform}" --name "${container}" "${tag}" >/dev/null
            docker cp "${container}:/codex-agent-identity-sidecar" "${binary}"
            docker rm "${container}" >/dev/null
            machine="$(readelf -h "${binary}" | awk -F: '/Machine:/{sub(/^[[:space:]]+/, "", $2); print $2}')"
            test "${machine}" = "${expected_machine}"
          done <<'ARCHITECTURES'
          linux/amd64|amd64|Advanced Micro Devices X86-64
          linux/arm64|arm64|AArch64
          ARCHITECTURES
