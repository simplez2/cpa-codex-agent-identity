name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            plugin/codex-agent-identity/go.sum
      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail
          find . -type f -name '*.go' -not -path './.git/*' -print0 | xargs -0 gofmt -l | tee /tmp/gofmt.out
          test ! -s /tmp/gofmt.out
      - name: Validate registry
        run: jq -e -f .github/scripts/validate-registry.jq registry.json
      - name: Verify tag matches source version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          grep -Fx "VERSION ?= ${version}" Makefile
          grep -Fq 'minimumSidecarVersion = "'"${version}"'"' plugin/codex-agent-identity/plugin.go
          grep -Fq 'pluginVersion = "'"${version}"'"' plugin/codex-agent-identity/plugin.go
      - run: make test
      - run: make race
      - run: make vet

  artifacts:
    name: Build linux/${{ matrix.goarch }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-24.04
          - goarch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            plugin/codex-agent-identity/go.sum
      - name: Resolve version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
      - name: Build plugin archive
        run: make package-plugin VERSION="${VERSION}" GOOS=linux GOARCH="${{ matrix.goarch }}"
      - name: Build sidecar archive
        shell: bash
        run: |
          set -euo pipefail
          binary="dist/cpa-codex-agent-identity-sidecar"
          archive="dist/cpa-codex-agent-identity-sidecar_${VERSION}_linux_${{ matrix.goarch }}.tar.gz"
          CGO_ENABLED=0 GOOS=linux GOARCH="${{ matrix.goarch }}" go build -trimpath -buildvcs=false -ldflags "-s -w" -o "${binary}" ./cmd/sidecar
          tar -C dist -czf "${archive}" cpa-codex-agent-identity-sidecar
          sha256sum "${archive}" > "${archive}.sha256"
          rm -f "${binary}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-linux-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/*.zip.sha256
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error

  release:
    needs: [artifacts, container]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          (cd dist && sha256sum -- *.zip *.tar.gz | sort -k 2 > checksums.txt)
          gh release create "${GITHUB_REF_NAME}" dist/*.zip dist/*.tar.gz dist/checksums.txt \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

  container:
    needs: verify
    runs-on: ubuntu-24.04
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          provenance: mode=min
          sbom: true
